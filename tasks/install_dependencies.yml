- name: Ensure jsondiff is installed
  ansible.builtin.apt:
    name: python3-jsondiff
    state: present
    update_cache: yes

- name: Ensure postgres swarm volume directory exists
  ansible.builtin.file:
    path: "{{ postgres_swarm_volume_path }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure docker swarm overlay network exists
  community.docker.docker_network:
    name: "{{ postgres_swarm_network_name }}"
    driver: overlay
    scope: swarm
    state: present
