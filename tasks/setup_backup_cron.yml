---
- name: Ensure WAL-G log directory exists
  ansible.builtin.file:
    path: "{{ postgres_swarm_log_dir }}"
    state: directory
    mode: '0750'

- name: Schedule WAL-G backup-push cron job
  ansible.builtin.cron:
    name: "wal-g backup-push {{ postgres_swarm_stack_name }}"
    minute: "{{ postgres_swarm_backup_cron_minute }}"
    hour: "{{ postgres_swarm_backup_cron_hour }}"
    day: "{{ postgres_swarm_backup_cron_day }}"
    month: "{{ postgres_swarm_backup_cron_month }}"
    weekday: "{{ postgres_swarm_backup_cron_weekday }}"
    job: >-
      /usr/bin/docker exec -i
      $(/usr/bin/docker ps -q --filter "label=com.docker.swarm.service.name={{ postgres_swarm_stack_name }}_postgres")
      wal-g.sh backup-push {{ postgres_swarm_pgdata }}
      >> {{ postgres_swarm_log_dir }}/walg_backup.log 2>&1

- name: Schedule WAL-G delete-before cron job
  ansible.builtin.cron:
    name: "wal-g delete {{ postgres_swarm_stack_name }}"
    minute: "{{ postgres_swarm_delete_cron_minute }}"
    hour: "{{ postgres_swarm_delete_cron_hour }}"
    day: "{{ postgres_swarm_delete_cron_day }}"
    month: "{{ postgres_swarm_delete_cron_month }}"
    weekday: "{{ postgres_swarm_delete_cron_weekday }}"
    job: >-
      /usr/bin/docker exec -i
      $(/usr/bin/docker ps -q --filter "label=com.docker.swarm.service.name={{ postgres_swarm_stack_name }}_postgres")
      wal-g.sh delete before FIND_FULL $(date -d '-{{ postgres_swarm_backup_retention_days }} days' '+\%FT\%TZ') --confirm
      >> {{ postgres_swarm_log_dir }}/walg_delete.log 2>&1
